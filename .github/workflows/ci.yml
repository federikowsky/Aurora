name: CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dub:
    name: ${{ matrix.compiler }} / ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - dmd
          - ldc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D compiler
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/dlang"
          curl -fsS https://dlang.org/install.sh -o "$HOME/dlang/install.sh"
          activate_path=$(bash "$HOME/dlang/install.sh" install "${{ matrix.compiler }}" -a)
          echo "D_ACTIVATE=$activate_path" >> "$GITHUB_ENV"

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          source "$D_ACTIVATE"
          dmd --version | head -1
          dub --version

      - name: Build library
        shell: bash
        run: |
          set -euo pipefail
          source "$D_ACTIVATE"
          dub build

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          source "$D_ACTIVATE"
          dub test
