name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dub:
    name: DUB build and unit tests (LDC)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc

      - name: Install native link dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libc++-dev libc++abi-dev

      - name: Show toolchain
        run: |
          ldc2 --version
          dub --version

      - name: Build library
        run: dub build --compiler=ldc2

      - name: Build release library
        run: dub build --compiler=ldc2 --build=release

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t native_libs < <(find "$HOME/.dub/packages" -type f \( -name 'libfastjsond.a' -o -name 'libwire.a' \) | sort)
          if [ "${#native_libs[@]}" -ne 2 ]; then
            printf 'Expected libfastjsond.a and libwire.a, found %d:\n' "${#native_libs[@]}" >&2
            printf '%s\n' "${native_libs[@]}" >&2
            exit 1
          fi
          link_flags=()
          for lib in "${native_libs[@]}"; do
            link_flags+=("-L${lib}")
          done
          DFLAGS="${link_flags[*]}" dub test --compiler=ldc2 --config=unittest
