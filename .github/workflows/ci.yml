name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dub:
    name: DUB build and unit tests (LDC)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc

      - name: Install native link dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libc++-dev libc++abi-dev

      - name: Show toolchain
        run: |
          ldc2 --version
          dub --version

      - name: Build library
        run: dub build --compiler=ldc2

      - name: Build release library
        run: dub build --compiler=ldc2 --build=release

      - name: Run unit tests
        env:
          DFLAGS: -L/home/runner/.dub/packages/fastjsond/1.0.2/fastjsond/libfastjsond.a -L/home/runner/.dub/packages/wire/1.0.4/wire/libwire.a
        run: dub test --compiler=ldc2 --config=unittest
